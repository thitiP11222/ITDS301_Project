<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>รายการใบสั่งยา</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Kanit', sans-serif;
    }

    body {
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
    }

    .navbar {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar .brand {
      font-size: 20px;
      font-weight: 700;
      color: #15803d;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      background: #ecfdf5;
      color: #15803d;
      font-weight: 600;
      font-size: 14px;
    }

    .nav-links a:hover {
      background: #d1fae5;
    }

    .container {
      max-width: 1300px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .page-header {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
      padding: 30px 32px;
      border-radius: 18px;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(22, 163, 74, 0.14);
    }

    .page-header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .page-header p {
      margin: 0;
      opacity: 0.95;
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      min-width: 260px;
      font-size: 14px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
    }

    .btn {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .btn-primary {
      background: #16a34a;
      color: white;
    }

    .btn-primary:hover {
      background: #15803d;
    }

    .btn-secondary {
      background: #e5ebe6;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .table-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #e5ebe5;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #effff2;
      color: #166534;
      font-weight: 700;
      white-space: nowrap;
    }

    tr:hover {
      background: #fafafa;
    }

    .empty-state {
      padding: 24px;
      text-align: center;
      color: #6b7280;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: white;
    }

    .status-planned { background: #648b6e; }
    .status-arrived { background: #0284c7; }
    .status-in-progress { background: #f59e0b; }
    .status-finished { background: #16a34a; }
    .status-cancelled { background: #dc2626; }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #dbfeec;
      color: #166534;
      font-size: 12px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .page-header h1 {
        font-size: 22px;
      }

      input[type="text"] {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="brand">HIS Dashboard</a>
    <div class="nav-links">
      <a href="/">หน้าหลัก</a>
      <a href="/form">เพิ่มข้อมูล</a>
      <a href="/view-patient">Patient</a>
      <a href="/view-encounter">Encounter</a>
      <a href="/view-medication">Medication</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>รายการใบสั่งยา</h1>
      <p>แสดงข้อมูลใบสั่งยาที่บันทึกจากฟอร์มข้อมูลใบสั่งยาในระบบ</p>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="ค้นหา ชื่อผู้ป่วย / ชื่อยา / วิธีใช้ / แพทย์ผู้สั่งยา">
        <button class="btn btn-primary" onclick="loadMedications()">ค้นหา</button>
        <button class="btn btn-secondary" onclick="resetSearch()">ล้างค้นหา</button>
      </div>
      <div class="pill" id="totalCount">ทั้งหมด 0 รายการ</div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ลำดับ</th>
              <th>ชื่อผู้ป่วย</th>
              <th>ชื่อยา</th>
              <th>ขนาดยา / ความถี่</th>
              <th>วิธีใช้</th>
              <th>จำนวน</th>
              <th>วันที่สั่งยา</th>
              <th>แพทย์ผู้สั่งยา</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="medicationTableBody">
            <tr>
              <td colspan="9" class="empty-state">กำลังโหลดข้อมูล...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function getMedicationSubject(item) {
      if (item.subject && String(item.subject).trim()) {
        return String(item.subject).trim();
      }

      return item.resource?.subject?.display || "-";
    }

    function getMedicationName(item) {
      if (item.medicineName && String(item.medicineName).trim()) {
        return String(item.medicineName).trim();
      }

      return item.resource?.medicationCodeableConcept?.text || "-";
    }

    function getMedicationDosage(item) {
      if (item.dosageText && String(item.dosageText).trim()) {
        return String(item.dosageText).trim();
      }

      return item.resource?.dosageInstruction?.[0]?.text || "-";
    }

    function getMedicationInstruction(item) {
      if (item.instruction && String(item.instruction).trim()) {
        return String(item.instruction).trim();
      }

      return item.resource?.dosageInstruction?.[0]?.patientInstruction || "-";
    }

    function getMedicationQuantity(item) {
      if (item.quantity !== undefined && item.quantity !== null && item.quantity !== "") {
        return item.quantity;
      }

      return item.resource?.dispenseRequest?.quantity?.value ?? "-";
    }

    function getMedicationDate(item) {
      if (item.authoredOn && String(item.authoredOn).trim()) {
        return String(item.authoredOn).trim();
      }

      return item.prescriptionDate || item.resource?.authoredOn || "-";
    }

    function getMedicationRequester(item) {
      if (item.requester && String(item.requester).trim()) {
        return String(item.requester).trim();
      }

      return item.prescribingDoctor || item.resource?.requester?.display || "-";
    }

    function getMedicationStatus(item) {
      if (item.status && String(item.status).trim()) {
        return String(item.status).trim();
      }

      return item.resource?.status || "-";
    }

    async function loadMedications() {
      const tbody = document.getElementById("medicationTableBody");
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      tbody.innerHTML = `<tr><td colspan="9" class="empty-state">กำลังโหลดข้อมูล...</td></tr>`;

      try {
        const response = await fetch("/medications");
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "โหลดข้อมูลไม่สำเร็จ");
        }

        const medications = Array.isArray(data) ? data : (data.medications || []);

        if (!Array.isArray(medications)) {
          tbody.innerHTML = `<tr><td colspan="9" class="empty-state">รูปแบบข้อมูลไม่ถูกต้อง</td></tr>`;
          document.getElementById("totalCount").textContent = "ทั้งหมด 0 รายการ";
          return;
        }

        let filtered = medications;

        if (keyword) {
          filtered = medications.filter(item =>
            getMedicationSubject(item).toLowerCase().includes(keyword) ||
            getMedicationName(item).toLowerCase().includes(keyword) ||
            getMedicationInstruction(item).toLowerCase().includes(keyword) ||
            getMedicationRequester(item).toLowerCase().includes(keyword)
          );
        }

        document.getElementById("totalCount").textContent = `ทั้งหมด ${filtered.length} รายการ`;

        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="9" class="empty-state">ไม่พบข้อมูลใบสั่งยา</td></tr>`;
          return;
        }

        tbody.innerHTML = filtered.map((item, index) => `
          <tr>
            <td>${index + 1}</td>
            <td>${getMedicationSubject(item)}</td>
            <td>${getMedicationName(item)}</td>
            <td>${getMedicationDosage(item)}</td>
            <td>${getMedicationInstruction(item)}</td>
            <td>${getMedicationQuantity(item)}</td>
            <td>${getMedicationDate(item)}</td>
            <td>${getMedicationRequester(item)}</td>
            <td>${getMedicationStatus(item)}</td>
          </tr>
        `).join("");
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="9" class="empty-state">ไม่สามารถโหลดข้อมูลได้</td></tr>`;
        document.getElementById("totalCount").textContent = "ทั้งหมด 0 รายการ";
        console.error(error);
      }
    }

    function resetSearch() {
      document.getElementById("searchInput").value = "";
      loadMedications();
    }

    window.onload = loadMedications;
  </script>
</body>
</html>

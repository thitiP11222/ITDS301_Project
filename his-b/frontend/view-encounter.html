<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>รายการการมารับบริการ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Kanit', sans-serif;
    }

    body {
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
    }

    .navbar {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar .brand {
      font-size: 20px;
      font-weight: 700;
      color: #15803d;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      background: #ecfdf5;
      color: #15803d;
      font-weight: 600;
      font-size: 14px;
    }

    .nav-links a:hover {
      background: #d1fae5;
    }

    .container {
      max-width: 1300px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .page-header {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
      padding: 30px 32px;
      border-radius: 18px;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(22, 163, 74, 0.14);
    }

    .page-header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .page-header p {
      margin: 0;
      opacity: 0.95;
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      min-width: 260px;
      font-size: 14px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
    }

    .btn {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .btn-primary {
      background: #16a34a;
      color: white;
    }

    .btn-primary:hover {
      background: #15803d;
    }

    .btn-secondary {
      background: #e5ebe6;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .table-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #e5ebe5;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #effff2;
      color: #166534;
      font-weight: 700;
      white-space: nowrap;
    }

    tr:hover {
      background: #fafafa;
    }

    .empty-state {
      padding: 24px;
      text-align: center;
      color: #6b7280;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: white;
    }

    .status-planned { background: #648b6e; }
    .status-arrived { background: #0284c7; }
    .status-in-progress { background: #f59e0b; }
    .status-finished { background: #16a34a; }
    .status-cancelled { background: #dc2626; }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #dbfeec;
      color: #166534;
      font-size: 12px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .page-header h1 {
        font-size: 22px;
      }

      input[type="text"] {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="brand">HIS Dashboard</a>
    <div class="nav-links">
      <a href="/">หน้าหลัก</a>
      <a href="/form">เพิ่มข้อมูล</a>
      <a href="/view-patient">Patient</a>
      <a href="/view-encounter">Encounter</a>
      <a href="/view-medication">Medication</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>รายการการมารับบริการ</h1>
      <p>แสดงข้อมูลการเข้ารับบริการของผู้ป่วยจากฟอร์ม Encounter</p>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="ค้นหา HN / ชื่อผู้ป่วย / แพทย์ / ประเภทบริการ">
        <button class="btn btn-primary" onclick="loadEncounters()">ค้นหา</button>
        <button class="btn btn-secondary" onclick="resetSearch()">ล้างค้นหา</button>
      </div>
      <div class="pill" id="totalCount">ทั้งหมด 0 รายการ</div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ลำดับ</th>
              <th>ชื่อผู้ป่วย</th>
              <th>วันที่/เวลาเข้ารับบริการ</th>
              <th>ประเภทการรับบริการ</th>
              <th>แพทย์</th>
              <th>สถานะการรับบริการ</th>
            </tr>
          </thead>
          <tbody id="encounterTableBody">
            <tr>
              <td colspan="6" class="empty-state">กำลังโหลดข้อมูล...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function getStatusLabel(status) {
      const labels = {
        "planned": "วางแผนไว้",
        "arrived": "มาถึงแล้ว",
        "in-progress": "กำลังรับบริการ",
        "finished": "เสร็จสิ้น",
        "cancelled": "ยกเลิก"
      };
      return labels[status] || status || "-";
    }

    function getStatusClass(status) {
      const map = {
        "planned": "status-planned",
        "arrived": "status-arrived",
        "in-progress": "status-in-progress",
        "finished": "status-finished",
        "cancelled": "status-cancelled"
      };
      return map[status] || "status-planned";
    }

    function getServiceTypeLabel(type) {
      const labels = {
        "opd": "ผู้ป่วยนอก (OPD)",
        "ipd": "ผู้ป่วยใน (IPD)",
        "emergency": "ฉุกเฉิน",
        "followup": "ติดตามอาการ"
      };
      return labels[type] || type || "-";
    }

    function extractHNFromReference(ref) {
      if (!ref) return "-";
      return ref;
    }

    function getEncounterHN(item) {
      if (item.hn && String(item.hn).trim()) {
        return String(item.hn).trim();
      }

      const resource = item.resource || {};
      const identifiers = resource.subject?.identifier || [];
      const found = identifiers.find(i => (i.system || "").includes("hn"));
      if (found?.value) return found.value;

      return "-";
    }

    function getEncounterSubject(item) {
      if (item.subject && String(item.subject).trim()) {
        return String(item.subject).trim();
      }

      return item.resource?.subject?.display || "-";
    }

    function getEncounterDate(item) {
      if (item.periodStart && String(item.periodStart).trim()) {
        return String(item.periodStart).trim();
      }

      return item.visitDateTime || item.resource?.period?.start || "-";
    }

    function getEncounterServiceType(item) {
      if (item.serviceType && String(item.serviceType).trim()) {
        return String(item.serviceType).trim();
      }

      return item.resource?.serviceType?.text || "-";
    }

    function getEncounterDoctor(item) {
      if (item.doctor && String(item.doctor).trim()) {
        return String(item.doctor).trim();
      }

      return item.resource?.participant?.[0]?.individual?.display || "-";
    }

    function getEncounterStatus(item) {
      if (item.encounterStatus && String(item.encounterStatus).trim()) {
        return String(item.encounterStatus).trim();
      }

      return item.status || item.resource?.status || "-";
    }

    async function loadEncounters() {
      const tbody = document.getElementById("encounterTableBody");
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      tbody.innerHTML = `<tr><td colspan="6" class="empty-state">กำลังโหลดข้อมูล...</td></tr>`;

      try {
        const response = await fetch("/encounters");
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "โหลดข้อมูลไม่สำเร็จ");
        }

        const encounters = Array.isArray(data) ? data : (data.encounters || []);

        if (!Array.isArray(encounters)) {
          tbody.innerHTML = `<tr><td colspan="6" class="empty-state">รูปแบบข้อมูลไม่ถูกต้อง</td></tr>`;
          document.getElementById("totalCount").textContent = "ทั้งหมด 0 รายการ";
          return;
        }

        let filtered = encounters;

        if (keyword) {
          filtered = encounters.filter(item =>
            getEncounterHN(item).toLowerCase().includes(keyword) ||
            getEncounterSubject(item).toLowerCase().includes(keyword) ||
            getEncounterDoctor(item).toLowerCase().includes(keyword) ||
            getEncounterServiceType(item).toLowerCase().includes(keyword)
          );
        }

        document.getElementById("totalCount").textContent = `ทั้งหมด ${filtered.length} รายการ`;

        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" class="empty-state">ไม่พบข้อมูลการมารับบริการ</td></tr>`;
          return;
        }

        tbody.innerHTML = filtered.map((item, index) => {
          const status = getEncounterStatus(item);
          return `
            <tr>
              <td>${index + 1}</td>
              <td>${getEncounterSubject(item)}</td>
              <td>${getEncounterDate(item)}</td>
              <td>${getServiceTypeLabel(getEncounterServiceType(item))}</td>
              <td>${getEncounterDoctor(item)}</td>
              <td>
                <span class="status-badge ${getStatusClass(status)}">
                  ${getStatusLabel(status)}
                </span>
              </td>
            </tr>
          `;
        }).join("");
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">ไม่สามารถโหลดข้อมูลได้</td></tr>`;
        document.getElementById("totalCount").textContent = "ทั้งหมด 0 รายการ";
        console.error(error);
      }
    }

    function resetSearch() {
      document.getElementById("searchInput").value = "";
      loadEncounters();
    }

    window.onload = loadEncounters;
  </script>
</body>
</html>
